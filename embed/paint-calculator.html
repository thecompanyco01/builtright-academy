<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paint Calculator Widget — BuiltRight Academy</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:transparent;color:#1a1a2e}
.calc-widget{max-width:400px;background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:24px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.calc-widget h2{font-size:18px;margin-bottom:16px;color:#1a1a2e;display:flex;align-items:center;gap:8px}
.calc-widget h2 span{font-size:22px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:13px;font-weight:600;color:#475569;margin-bottom:4px}
.form-group input,.form-group select{width:100%;padding:10px 12px;border:1px solid #cbd5e1;border-radius:8px;font-size:15px;transition:border .2s}
.form-group input:focus,.form-group select:focus{outline:none;border-color:#f97316}
.row{display:flex;gap:10px}
.row .form-group{flex:1}
.btn{width:100%;padding:12px;background:#f97316;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;transition:background .2s}
.btn:hover{background:#ea580c}
.result{margin-top:16px;padding:16px;background:#fff7ed;border-radius:8px;border:1px solid #fed7aa;display:none}
.result h3{font-size:14px;color:#9a3412;margin-bottom:8px}
.result .amount{font-size:28px;font-weight:700;color:#ea580c}
.result .unit{font-size:14px;color:#78716c}
.result .details{margin-top:8px;font-size:13px;color:#57534e;line-height:1.5}
.powered{margin-top:12px;text-align:center;font-size:11px;color:#94a3b8}
.powered a{color:#f97316;text-decoration:none;font-weight:600}
.powered a:hover{text-decoration:underline}
</style>
</head>
<body>
<div class="calc-widget">
  <h2><span>🎨</span> Paint Calculator</h2>
  <div class="row">
    <div class="form-group">
      <label>Room Length (ft)</label>
      <input type="number" id="length" placeholder="12" step="0.5">
    </div>
    <div class="form-group">
      <label>Room Width (ft)</label>
      <input type="number" id="width" placeholder="10" step="0.5">
    </div>
  </div>
  <div class="row">
    <div class="form-group">
      <label>Ceiling Height (ft)</label>
      <input type="number" id="height" placeholder="8" step="0.5" value="8">
    </div>
    <div class="form-group">
      <label>Coats</label>
      <select id="coats">
        <option value="1">1 coat</option>
        <option value="2" selected>2 coats</option>
        <option value="3">3 coats</option>
      </select>
    </div>
  </div>
  <div class="form-group">
    <label>Doors & Windows (subtract)</label>
    <select id="openings">
      <option value="0">None</option>
      <option value="1" selected>1 door + 1 window (~35 sq ft)</option>
      <option value="2">1 door + 2 windows (~55 sq ft)</option>
      <option value="3">2 doors + 2 windows (~75 sq ft)</option>
    </select>
  </div>
  <button class="btn" onclick="calculate()">Calculate</button>
  <div class="result" id="result">
    <h3>You Need:</h3>
    <div><span class="amount" id="gallons">—</span> <span class="unit">gallons</span></div>
    <div class="details" id="details"></div>
  </div>
  <div class="powered">Powered by <a href="https://builtright-academy.vercel.app/tools/paint-calculator.html" target="_blank" rel="noopener">BuiltRight Academy</a> — Free Contractor Tools</div>
</div>
<script>
function calculate(){
  const l=parseFloat(document.getElementById('length').value);
  const w=parseFloat(document.getElementById('width').value);
  const h=parseFloat(document.getElementById('height').value)||8;
  const coats=parseInt(document.getElementById('coats').value);
  const openings=parseInt(document.getElementById('openings').value);
  if(!l||!w){alert('Please enter room dimensions');return}
  const openingSqFt=[0,35,55,75][openings]||0;
  const wallArea=2*(l+w)*h-openingSqFt;
  const totalArea=wallArea*coats;
  const gallons=totalArea/350;
  const gallonsRound=Math.ceil(gallons);
  const cost=(gallonsRound*35).toFixed(0);
  document.getElementById('gallons').textContent=gallonsRound;
  document.getElementById('details').innerHTML=
    `Wall area: <strong>${wallArea.toFixed(0)} sq ft</strong><br>`+
    `× ${coats} coats = <strong>${totalArea.toFixed(0)} sq ft</strong> coverage<br>`+
    `At 350 sq ft/gallon = <strong>${gallons.toFixed(1)} gallons</strong><br>`+
    `Est. cost: <strong>$${cost}</strong> (at ~$35/gal)`;
  document.getElementById('result').style.display='block';
}
</script>
</body>
</html>
